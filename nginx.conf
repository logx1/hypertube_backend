events {
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Upstream definitions for your containerized services
    upstream movies_backend {
        server movies:8000;
    }

    upstream rails_backend {
        server rails:8001;
    }

    # 1. HTTP Server - Redirect all traffic to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS Server
    server {
        listen 443 ssl;
        server_name _;

        # SSL Configuration
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- Internal Auth Subrequest ---
        # This location is not accessible from the outside.
        # It is used by Nginx to verify the Bearer token with Rails.
        location = /internal-auth-check {
            internal;
            proxy_pass http://rails_backend/check_token;
            
            # Subrequests should not forward the original request body
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            # Explicitly pass the Bearer token to the Rails backend
            proxy_set_header Authorization $http_authorization;
            
            # Pass original context if Rails needs to log it
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Public Auth Endpoints ---
        # Used for login/registration so users can actually get a token.
        location /auth/ {
            proxy_pass http://rails_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Protected Movie Service ---
        # Any request here triggers the subrequest to Rails first.
        location / {
            auth_request /internal-auth-check;

            # If the subrequest returns 200, Nginx continues here:
            proxy_pass http://movies_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Optional: If Rails returns a user ID header, pass it to Movies
            # auth_request_set $user_id $upstream_http_x_user_id;
            # proxy_set_header X-User-Id $user_id;
        }

        # Error handling: If auth fails, return a JSON error or custom page
        error_page 401 = @error401;
        location @error401 {
            return 401 '{"error": "Unauthorized: Invalid or missing Bearer token"}';
            add_header Content-Type application/json;
        }
    }
}