services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      # - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - movies
      - rails

  front_end:
    container_name: hypertube_fromtend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/my-react-app:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  movies:
    container_name: backend
    build:
      context: ./movies
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    stdin_open: true
    tty: true
    environment:
      - tmdb_api_key=${tmdb_api_key}
      - DB_BACKEND_USER=${DB_BACKEND_USER}
      - DB_BACKEND_NAME=${DB_BACKEND_NAME}
      - DB_MOVIES_BACKEND_PASSWORD=${DB_MOVIES_BACKEND_PASSWORD}
    depends_on:
      - rails

  rails:
    build: ./auth
    # ports:
    # - "8001:8001"
    volumes:
      - ./auth:/app
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - FORTYTWO_CLIENT_ID=${FORTYTWO_CLIENT_ID}
      - FORTYTWO_CLIENT_SECRET=${FORTYTWO_CLIENT_SECRET}
      - GOOGLE_SMTP_USERNAME=${GOOGLE_SMTP_USERNAME}
      - GOOGLE_SMTP_PASSWORD=${GOOGLE_SMTP_PASSWORD}
    depends_on:
      - postgres
  postgres:
    image: postgres:18
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_BACKEND_USER=${DB_BACKEND_USER}
      - DB_BACKEND_NAME=${DB_BACKEND_NAME}
      - DB_MOVIES_BACKEND_PASSWORD=${DB_MOVIES_BACKEND_PASSWORD}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000" # API port
      - "9001:9001" # Console (Dashboard) port
    environment:
      MINIO_ROOT_USER: "your-access-key" # Change this!
      MINIO_ROOT_PASSWORD: "your-secret-password" # Change this!
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
